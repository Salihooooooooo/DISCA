
<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen">

    <div class="loginBox">

        <h1>DISCA</h1>

        <input id="username" placeholder="Kullanıcı adı">

        <button onclick="login()">Giriş Yap</button>

    </div>

</div>

<!-- 💬 APP -->
<div class="app" style="display:none;">

    <!-- 📁 SOL BAR -->
    <div class="sidebar">

        <h2>DISCA</h2>

        <h3>📢 Kanallar</h3>

        <div class="channel" onclick="switchChannel('genel')"># genel</div>
        <div class="channel" onclick="switchChannel('oyun')"># oyun</div>
        <div class="channel" onclick="switchChannel('sohbet')"># sohbet</div>

        <h3>👥 Arkadaşlar</h3>

        <button onclick="addFriend()">+ Arkadaş Ekle</button>

        <div id="friendList"></div>

    </div>

    <!-- 💬 CHAT -->
    <div class="chat">

        <div class="chat-header" id="chatHeader"># genel</div>

        <ul id="messages"></ul>

        <!-- EMOJİ -->
        <div class="emojiBar">
            <button onclick="addEmoji('😎')">😎</button>
            <button onclick="addEmoji('😂')">😂</button>
            <button onclick="addEmoji('🔥')">🔥</button>
        </div>

        <!-- MESSAGE INPUT -->
        <div class="messageBox">

            <input id="messageInput" placeholder="Mesaj yaz...">

            <button onclick="sendMessage()">Gönder</button>

        </div>

    </div>

</div>

<!-- SOCKET -->
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
